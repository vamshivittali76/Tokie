name: Dry-run to TestPyPI

# Manually triggered dry-run: build the current main and push to TestPyPI
# without creating a git tag. Use this to validate metadata / long-description
# rendering / install on a clean venv before cutting a real `v*` tag.
#
# Requires Trusted Publisher config on https://test.pypi.org/manage/account/publishing/
# pointing at `vamshivittali76/Tokie` / workflow `dryrun-testpypi.yml` / environment `testpypi`.

on:
  workflow_dispatch:
    inputs:
      local_version_suffix:
        description: "PEP 440 local version suffix (e.g. .dev1, rc1) appended to pyproject version"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + push to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tokie-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Apply local version suffix (if any)
        if: ${{ inputs.local_version_suffix != '' }}
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          data = p.read_text()
          suffix = "${{ inputs.local_version_suffix }}"
          data = re.sub(
              r'^version = "([^"]+)"',
              lambda m: f'version = "{m.group(1)}{suffix}"',
              data,
              count=1,
              flags=re.MULTILINE,
          )
          p.write_text(data)
          PY
      - name: Build
        run: uv build
      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --upgrade pip
          /tmp/verify/bin/pip install dist/*.whl
          /tmp/verify/bin/tokie version --json
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
