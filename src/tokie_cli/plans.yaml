  - id: anthropic_api_direct
    display_name: Anthropic API (pay-as-you-go)
    source_url: https://docs.anthropic.com/en/api/rate-limits
    notes: No subscription window; billed per-token. Rate limits exist but are not quota caps.
    subscription:
      id: anthropic_api_direct
      provider: anthropic
      product: anthropic-api
      plan: payg
      account_id: default
      windows:
        - window_type: none

  - id: openai_tier1
    display_name: OpenAI API Tier 1
    source_url: https://platform.openai.com/docs/guides/rate-limits
    notes: New accounts; monthly spend cap around $100 depending on org settings.
    subscription:
      id: openai_tier1
      provider: openai
      product: openai-api
      plan: tier1
      account_id: default
      windows:
        - window_type: monthly
          limit_usd: 100.0

