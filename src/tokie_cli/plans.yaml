version: 1
updated: 2026-04-20
# Every entry carries a `trackability` tier so the dashboard can render
# untrackable web-only tools with the correct INFERRED badge and route
# them to the manual-entry workflow.
#   local_exact      — parsed from a vendor's own on-disk log
#   api_exact        — pulled from a vendor admin/usage endpoint
#   web_only_manual  — no local signal; user enters usage through `manual` collector
plans:
  - id: claude_pro_personal
    trackability: local_exact
    display_name: Claude Pro
    source_url: https://www.anthropic.com/pricing
    notes: Shared bucket across claude-code, claude-web, claude-desktop, claude-mobile.
    subscription:
      id: claude_pro_personal
      provider: anthropic
      product: claude-pro
      plan: pro
      account_id: default
      windows:
        - window_type: rolling_5h
          limit_messages: 45
          shared_with: [claude-code, claude-web, claude-desktop, claude-mobile]
        - window_type: weekly
          limit_messages: 900
          shared_with: [claude-code, claude-web, claude-desktop, claude-mobile]

  - id: claude_max5_personal
