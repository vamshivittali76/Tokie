version: 1
updated: 2026-04-20
plans:
  - id: claude_pro_personal
    display_name: Claude Pro
    source_url: https://www.anthropic.com/pricing
    notes: Shared bucket across claude-code, claude-web, claude-desktop, claude-mobile.
    subscription:
      id: claude_pro_personal
      provider: anthropic
      product: claude-pro
      plan: pro
      account_id: default
      windows:
        - window_type: rolling_5h
          limit_messages: 45
          shared_with: [claude-code, claude-web, claude-desktop, claude-mobile]
        - window_type: weekly
          limit_messages: 900
          shared_with: [claude-code, claude-web, claude-desktop, claude-mobile]

